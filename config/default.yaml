default_provider: llamacpp

providers:
  openrouter:
    type: openrouter
    ssl_verify: false
    base_url: https://openrouter.ai/api/v1
    api_key: ${OPENROUTER_API_KEY}
    model: stepfun/step-3.5-flash:free

  ollama:
    type: ollama
    base_url: http://localhost:11434/v1
    model: llama3.2

  llamacpp:
    type: llamacpp
    base_url: http://localhost:8080/v1
    model: default
    temperature: 0.6  # Qwen3 recommended (matches --temp 0.6 on server)

  gemini:
    type: gemini
    base_url: https://generativelanguage.googleapis.com/v1beta
    api_key: ${GEMINI_API_KEY}
    model: gemini-2.0-flash

fallback:
  fallback_chain: [ollama, openrouter, llamacpp]
  retry_on: [timeout, connection_error, "500", "502", "503", "529"]

skills_dirs:
  - ./skills
  - ~/.vector/skills

memory_db_path: ~/.eyetor/memory.db

tracking:
  db_path: ~/.eyetor/tracking.db
  limits:
    openrouter:
      daily_cost_usd: 10.0
      daily_tokens: 1000000

channels:
  telegram:
    enabled: true
    bot_token: ${TELEGRAM_BOT_TOKEN}
    streaming_chunk_size: 20
    ssl_verify: false
    auth:
      enabled: true
      allowed_users:
        - ${TELEGRAM_ALLOWED_USER}   # your numeric chat_id, e.g.: 123456789

scheduler:
  enabled: true
  db_path: ~/.eyetor/scheduler.db
  default_timezone: Europe/Madrid

orchestrator:
  auto_delegate: false
  workers: {}

image_providers:
  gemini-flash:
    type: gemini
    provider: gemini          # inherits base_url, api_key from providers.gemini
    model: gemini-3.1-flash-image-preview

default_image_provider: gemini-flash

mcp_servers: {}

log_level: INFO
