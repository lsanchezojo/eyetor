providers:
  openrouter:
    type: openrouter
    ssl_verify: false
    base_url: https://openrouter.ai/api/v1
    api_key: ${OPENROUTER_API_KEY}
    model: stepfun/step-3.5-flash

  ollama:
    type: ollama
    base_url: http://localhost:11434/v1
    api_key: ${OLLAMA_API_KEY}   # optional; useful when Ollama is behind a local proxy
    model: llama3.2

  llamacpp:
    type: llamacpp
    base_url: http://localhost:8080/v1
    api_key: ${LLAMACPP_API_KEY}
    model: default
    temperature: 0.5
    thinking: true   # set to true to enable reasoning channel (Gemma-4, QwQ, etc.)
    request_timeout: 180   # cap a single /chat/completions call; aligned with sessions.budget.max_wall_seconds. Auxiliary calls (classifier, synthesis) pass thinking=false to stay under the cap.

  llamacpp-vision:
    type: llamacpp
    base_url: http://localhost:8082/v1
    model: default
    
  gemini:
    type: gemini
    base_url: https://generativelanguage.googleapis.com/v1beta
    api_key: ${GEMINI_API_KEY}
    model: gemini-2.0-flash

fallback:
  fallback_chain: [llamacpp, ollama, openrouter, gemini]
  retry_on: [timeout, connection_error, "500", "502", "503", "529"]

# Local-first task profiles for small models. Missing fields keep provider defaults.
profiles:
  chat:
    thinking: false
    temperature: 0.3
  tool_use:
    max_tool_calls: 6
    max_wall_seconds: 180
  classifier:
    temperature: 0.0
    thinking: false
  kb_research:
    thinking: false
    max_tool_calls: 3
    max_wall_seconds: 60
  synthesis:
    thinking: false
    temperature: 0.2
  compaction:
    temperature: 0.0
    thinking: false

skills_dirs:
  - ./skills
  - ~/.eyetor/skills
  - ~/.agents/skills

plugins_dirs:
  - ./plugins
  - ~/.eyetor/plugins

# Path to a markdown file with agent instructions and behavior rules.
# Appended to the system prompt. Can define agent roles, skill usage policies, etc.
agent_instructions: ~/.eyetor/AGENTS.md

memory_db_path: ~/.eyetor/memory.db

tracking:
  db_path: ~/.eyetor/tracking.db
  month_start_day: 1        # Day of the month when billing period starts (1-31)
  month_start_hour: 0       # Hour of the day when billing period starts (0-23)
  limits:
    openrouter:
      daily_cost_usd: 10.0
      daily_tokens: 1000000

channels:
  telegram:
    enabled: true
    bot_token: ${TELEGRAM_BOT_TOKEN}
    streaming_chunk_size: 20
    ssl_verify: false
    auth:
      enabled: true
      allowed_users:
        - ${TELEGRAM_ALLOWED_USER}   # your numeric chat_id, e.g.: 123456789

scheduler:
  enabled: true
  db_path: ~/.eyetor/scheduler.db
  default_timezone: Europe/Madrid

# Routing: clasifica cada mensaje y aplica un prompt + subconjunto de tools
# por ruta. Pensado para SLMs: evita que el modelo vea 15 herramientas cuando
# la pregunta sólo necesita dos. Cada ruta tiene una lista ``tools``:
#   - null (omitida)  → hereda todo el registro (todas las tools).
#   - []              → sin herramientas (respuesta directa, sin loop).
#   - ["kb_*", ...]   → whitelist (fnmatch) — sólo esas tools visibles.
routing:
  enabled: true
  classifier_votes: 1            # 1 = sin voting; subir a 3 si el clasificador es inconsistente
  routes:
    chat:
      description: "Saludos, charla casual, preguntas sobre el propio agente, small-talk"
      system_prompt: "Responde brevemente y en castellano. No invoques herramientas."
      tools: []
    kb_query:
      description: "Preguntas cuya respuesta está en la base de conocimientos local (reglamentos, manuales, apuntes indexados)"
      # handler=kb_2phase usa un flujo investigación→síntesis con budget de 3 tool calls
      # y condensación por resultado. El system_prompt aquí sólo es informativo — el
      # handler inyecta sus propios prompts por fase.
      system_prompt: "Consulta la KB local y responde en castellano citando documento y sección."
      tools: ["kb_search", "kb_read", "kb_list_sources"]
      handler: kb_2phase
    tool_task:
      description: "Tareas que requieren ejecutar acciones: shell, filesystem, búsquedas web, generación de imágenes, tareas programadas"
      system_prompt: "Ejecuta la tarea usando las herramientas disponibles. Responde en castellano al terminar."
      # tools omitido → hereda todo el registro

orchestrator:
  auto_delegate: false
  protocol: auto        # tool_calling | text | auto (tries tool_calling, falls back to text)
  workers: {}

image_providers:
  gemini-flash:
    type: gemini
    provider: gemini          # inherits base_url, api_key from providers.gemini
    model: gemini-3.1-flash-image-preview

default_image_provider: gemini-flash

# Vision provider: used to describe images sent by users (multimodal LLM call).
# References one of the providers above — inherits its base_url and api_key.
# The api_key must be set in .env (e.g. OPENROUTER_API_KEY).
vision_provider: openrouter # ej. openrouter
vision_model: nvidia/nemotron-nano-12b-v2-vl:free # ej. nvidia/nemotron-nano-12b-v2-vl:free

mcp_servers: {}

# Knowledge base — hybrid BM25 + semantic retrieval over workspace docs.
# Requires extras: pip install -e ".[knowledge-full]" for PDF/DOCX/XLSX/PPTX
# extractors and semantic embeddings. Without the extras the KB degrades
# gracefully to BM25-only over text/markdown/code files.
knowledge:
  enabled: true
  db_path: ~/.eyetor/knowledge.db
  auto_reindex_on_start: true
  auto_cwd_workspace: true
  max_file_size_bytes: 52428800   # 50 MB (admite PDFs grandes escaneados)
  workspaces:
    - name: default
      path: ~/.eyetor/knowledge
      include:
        - "**/*.md"
        - "**/*.mdx"
        - "**/*.rst"
        - "**/*.txt"
        - "**/*.py"
        - "**/*.js"
        - "**/*.ts"
        - "**/*.go"
        - "**/*.rs"
        - "**/*.yaml"
        - "**/*.yml"
        - "**/*.toml"
        - "**/*.json"
        - "**/*.ini"
        - "**/*.pdf"
        - "**/*.docx"
        - "**/*.xlsx"
        - "**/*.pptx"
      exclude:
        - "**/node_modules/**"
        - "**/.git/**"
        - "**/.venv/**"
        - "**/venv/**"
        - "**/__pycache__/**"
        - "**/build/**"
        - "**/dist/**"
        - "**/.next/**"
        - "**/target/**"
  chunk:
    max_chars: 1500
    overlap_chars: 150
  retrieval:
    top_k_default: 5
    snippet_chars: 400
    rrf_k: 60
    candidate_multiplier: 3
  embedding:
    enabled: false   # BM25-only: evita cargar fastembed/ONNX (~400 MB RAM residentes)
    model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
    model_dir: ~/.eyetor/models/fastembed
    dim: 384
    batch_size: 64

# Session persistence and compaction settings
sessions:
  persist: true
  # Per-turn budget — hard cap on how long a single user message can occupy the
  # agent before it is forced to synthesise with whatever it already has.
  # max_iterations (20) remains as a last-resort safety net; this trips first.
  # Set either field to 0 to disable that specific budget.
  budget:
    max_tool_calls: 6
    max_wall_seconds: 180
  chain:
    mode: auto           # auto | always | never — decompose complex queries into plan→execute→synthesize
    complexity_threshold: 800  # min chars to consider a message complex (auto mode)
    plan_votes: 1         # voting rounds for planning step (1 = no voting)
  compaction:
    enabled: true
    context_window: 32000           # aligned with llama-server -c 32768
    trigger_at_percent: 0.80
    tool_output_max_chars: 2000
    keep_last_n_user_turns: 2
    summary_max_percent: 0.05
    archive_dir: ~/.eyetor/sessions/archive

# Hard cap on tool result size — prevents one oversized result from
# blowing the context window. Override per-tool via ToolDefinition.max_output_chars.
tools:
  max_output_chars: 8000

log_level: INFO
