providers:
  openrouter:
    type: openrouter
    ssl_verify: false
    base_url: https://openrouter.ai/api/v1
    api_key: ${OPENROUTER_API_KEY}
    model: nvidia/nemotron-3-super-120b-a12b:free #stepfun/step-3.5-flash

  ollama:
    type: ollama
    base_url: http://localhost:11434/v1
    # OJO: en este equipo (iGPU AMD 890M, ~15 GB RAM unificada) este modelo
    # Q4_K_M necesita ~25 GiB en runtime y el kernel lo mata por OOM en
    # cualquier configuración. Para usar ollama de forma fiable hace falta
    # un modelo que quepa (~<12 GB): 14B/8B Q4, o un quant Q2/IQ2 del 36B.
    model: qwen3.6:35b-a3b-q4_K_M

  llamacpp:
    type: llamacpp
    base_url: http://localhost:8080/v1
    model: default
    temperature: 0.3   # bajado de 0.5: SLM Q4 más fiable en tool-calling sin decodificación degenerada
    thinking: true   # set to true to enable reasoning channel (Gemma-4, QwQ, etc.)
    request_timeout: 300
    reasoning_budget: 384
    # Caps de generación para evitar que un modelo local se quede razonando
    # miles de tokens. Se aplican como max_tokens y n_predict.
    max_tokens: 1024
    max_tokens_by_phase:
      main: 768
      degeneration_recovery: 512
      loop_break: 512
      chain_plan: 512
      chain_execute: 768
      chain_synthesize: 768
      agent: 768
    
  llamacpp-vision:
    type: llamacpp
    base_url: http://localhost:8082/v1
    model: default
    
  gemini:
    type: gemini
    base_url: https://generativelanguage.googleapis.com/v1beta
    api_key: ${GEMINI_API_KEY}
    model: gemini-2.0-flash

fallback:
  # llamacpp = servidor local (Qwen3.6-35B-A3B Q4_K_XL vía llama.cpp Vulkan
  # + mmap, ~/.local/bin/llamacpp-eyetor.sh). ollama queda fuera: con este
  # modelo no mmapea y el kernel lo mata por OOM en 15 GB de RAM.
  fallback_chain: [llamacpp, openrouter, gemini]
  retry_on:
    - timeout
    - connection_error
    - malformed_response
    - "400"
    - "408"
    - "413"
    - "422"
    - "429"
    - "500"
    - "502"
    - "503"
    - "529"

skills_dirs:
  - ./skills
  - ~/.eyetor/skills
  - ~/.agents/skills

plugins_dirs:
  - ./plugins
  - ~/.eyetor/plugins

# Path to a markdown file with agent instructions and behavior rules.
# Appended to the system prompt. Can define agent roles, skill usage policies, etc.
agent_instructions: ~/.eyetor/AGENTS.md

memory_db_path: ~/.eyetor/memory.db

tracking:
  db_path: ~/.eyetor/tracking.db
  month_start_day: 1        # Day of the month when billing period starts (1-31)
  month_start_hour: 0       # Hour of the day when billing period starts (0-23)
  limits:
    openrouter:
      daily_cost_usd: 10.0
      daily_tokens: 1000000

channels:
  telegram:
    enabled: true
    bot_token: ${TELEGRAM_BOT_TOKEN}
    streaming_chunk_size: 20
    ssl_verify: false
    auth:
      enabled: true
      allowed_users:
        - ${TELEGRAM_ALLOWED_USER}   # your numeric chat_id, e.g.: 123456789

scheduler:
  enabled: true
  db_path: ~/.eyetor/scheduler.db
  default_timezone: Europe/Madrid

# Routing: classify incoming messages and apply specialized system prompts.
# Improves SLM performance by reducing prompt complexity per route.
# routing:
#   enabled: true
#   classifier_votes: 3        # voting rounds for reliable classification (1 = no voting)
#   routes:
#     coding:
#       description: "Programming, code generation, debugging, and technical tasks"
#       system_prompt: "You are an expert programmer. Focus on writing clean, correct code."
#     research:
#       description: "Information lookup, analysis, and summarization tasks"
#       system_prompt: "You are a research specialist. Be thorough and cite your sources."
#     conversation:
#       description: "General chat, greetings, and casual conversation"
#       system_prompt: "You are a friendly conversational assistant. Be concise."

orchestrator:
  # When true and at least one valid worker is configured, the main chat
  # agent gets a `delegate` tool that routes subtasks to named subagents
  # loaded from ``agents_dirs``. Disabled by default.
  auto_delegate: true
  protocol: auto        # tool_calling | text | auto (tries tool_calling, falls back to text)
  # Workers are referenced by name; each name must match an ``<name>.md``
  # file in one of the directories listed in ``agents_dirs``. Unknown
  # names are skipped at startup with a warning.
  workers:
    - researcher
    - sysadmin

# Directories scanned for subagent definitions (``<name>.md`` files with
# YAML frontmatter + Markdown body used as the system prompt). Earlier
# entries are overridden by later ones on name conflict.
agents_dirs:
  - ./agents
  - ~/.eyetor/agents

image_providers:
  gemini-flash:
    type: gemini
    provider: gemini          # inherits base_url, api_key from providers.gemini
    model: gemini-3.1-flash-image-preview

default_image_provider: gemini-flash

# Vision provider: used to describe images sent by users (multimodal LLM call).
# References one of the providers above — inherits its base_url and api_key.
# The api_key must be set in .env (e.g. OPENROUTER_API_KEY).
vision_provider: openrouter # ej. openrouter
vision_model: nvidia/nemotron-nano-12b-v2-vl:free # ej. nvidia/nemotron-nano-12b-v2-vl:free

mcp_servers: {}

# Knowledge base — hybrid BM25 + semantic retrieval over workspace docs.
# Requires extras: pip install -e ".[knowledge-full]" for PDF/DOCX/XLSX/PPTX
# extractors and semantic embeddings. Without the extras the KB degrades
# gracefully to BM25-only over text/markdown/code files.
knowledge:
  enabled: true
  db_path: ~/.eyetor/knowledge.db
  auto_reindex_on_start: true
  auto_cwd_workspace: true
  max_file_size_bytes: 52428800   # 50 MB (admite PDFs grandes escaneados)
  workspaces:
    - name: default
      path: ~/.eyetor/knowledge
      include:
        - "**/*.md"
        - "**/*.mdx"
        - "**/*.rst"
        - "**/*.txt"
        - "**/*.py"
        - "**/*.js"
        - "**/*.ts"
        - "**/*.go"
        - "**/*.rs"
        - "**/*.yaml"
        - "**/*.yml"
        - "**/*.toml"
        - "**/*.json"
        - "**/*.ini"
        - "**/*.pdf"
        - "**/*.docx"
        - "**/*.xlsx"
        - "**/*.pptx"
      exclude:
        - "**/node_modules/**"
        - "**/.git/**"
        - "**/.venv/**"
        - "**/venv/**"
        - "**/__pycache__/**"
        - "**/build/**"
        - "**/dist/**"
        - "**/.next/**"
        - "**/target/**"
  chunk:
    max_chars: 1500
    overlap_chars: 150
  retrieval:
    top_k_default: 5
    snippet_chars: 400
    rrf_k: 60
    candidate_multiplier: 3
  embedding:
    enabled: false   # BM25-only: evita cargar fastembed/ONNX (~400 MB RAM residentes)
    model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
    model_dir: ~/.eyetor/models/fastembed
    dim: 384
    batch_size: 64

# Session persistence and compaction settings
sessions:
  persist: true
  # Conditional tool loading: only send token-heavy tool groups (scheduler,
  # image, kb, install) on turns whose text triggers them. Skills, memory and
  # delegate are always available. sticky_turns keeps a used group active for
  # N follow-up turns so "cancélalo"/"sí" still see it. Set enabled: false to
  # send every tool every turn (previous behavior).
  tool_gating:
    enabled: true
    sticky_turns: 2
  chain:
    mode: auto           # auto | always | never — decompose complex queries into plan→execute→synthesize
    complexity_threshold: 300  # min chars to consider a message complex (auto mode)
    plan_votes: 1         # voting rounds for planning step (1 = no voting)
  compaction:
    enabled: true
    context_window: 12288           # = n_ctx real del servidor llama.cpp (/props); mantener sincronizado si se cambia -c
    trigger_at_percent: 0.70
    tool_output_max_chars: 2000
    keep_last_n_user_turns: 2
    summary_max_percent: 0.05
    archive_dir: ~/.eyetor/sessions/archive

log_level: INFO
